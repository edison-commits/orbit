name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Expo dependency check
        run: npx --no-install expo install --check

      - name: Verify public Expo permissions
        run: |
          npx --no-install expo config --type public --json > /tmp/expo-public-config.json
          node - <<'NODE'
          const fs = require('fs');
          const config = JSON.parse(fs.readFileSync('/tmp/expo-public-config.json', 'utf8'));
          const permissions = config.android?.permissions ?? [];
          const serialized = JSON.stringify(config);
          console.log(JSON.stringify({ androidPermissions: permissions, hasRecordAudio: serialized.includes('android.permission.RECORD_AUDIO') }, null, 2));
          if (serialized.includes('android.permission.RECORD_AUDIO')) {
            throw new Error('Unexpected android.permission.RECORD_AUDIO in public Expo config');
          }
          NODE

      - name: Audit for high and critical vulnerabilities
        run: |
          set +e
          npm audit --audit-level=moderate --json > /tmp/npm-audit.json
          audit_exit=$?
          set -e
          node - <<'NODE' "$audit_exit"
          const fs = require('fs');
          const auditExit = Number(process.argv[2]);
          const audit = JSON.parse(fs.readFileSync('/tmp/npm-audit.json', 'utf8'));
          const vulnerabilities = audit.metadata?.vulnerabilities ?? {};
          console.log(JSON.stringify({ auditExit, vulnerabilities }, null, 2));
          if ((vulnerabilities.high ?? 0) > 0 || (vulnerabilities.critical ?? 0) > 0) {
            throw new Error('High or critical npm audit vulnerability found');
          }
          NODE

      - name: Export bundle smoke tests
        run: |
          npx --no-install expo export --platform ios --output-dir /tmp/orbit-export-ios
          npx --no-install expo export --platform android --output-dir /tmp/orbit-export-android
          npx --no-install expo export --platform web --output-dir /tmp/orbit-export-web
          test -n "$(find /tmp/orbit-export-ios -type f -print -quit)"
          test -n "$(find /tmp/orbit-export-android -type f -print -quit)"
          test -n "$(find /tmp/orbit-export-web -type f -print -quit)"
          find /tmp/orbit-export-web -type f -name '*wa-sqlite*.wasm' -print -quit | grep -q .
